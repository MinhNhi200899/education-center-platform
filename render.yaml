# Render Blueprint — Backend API
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ecmp-api
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build && npx prisma db push
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: PASSWORD_RESET_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
