# Render Blueprint — Backend API
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ecmp-api
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm ci --include=dev && npm run build && npx prisma db push
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: PASSWORD_RESET_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false

  # Xóa bài tập Google Drive cũ hơn HOMEWORK_RETENTION_DAYS (mặc định 30 ngày)
  - type: cron
    name: ecmp-homework-cleanup
    runtime: node
    region: singapore
    plan: free
    schedule: "0 3 * * *"
    buildCommand: npm ci --include=dev
    startCommand: npm run cleanup:homework
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: HOMEWORK_RETENTION_DAYS
        value: "30"
